<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 794 1123" width="794" height="1123">
  <!-- Background -->
  <rect id="background-shape" width="794" height="1123" fill="var(--background-color, #09090b)" />
  
  <!-- Primary Shape -->
  <rect id="primary-shape" width="300" height="1123" fill="var(--primary-color, #3b82f6)" opacity="0.1" />
  
  <!-- Secondary Shape -->
  <rect id="secondary-shape" x="750" width="44" height="1123" fill="var(--secondary-color, #1e3a8a)" />
  
  <!-- Accent Shape -->
  <rect id="accent-shape" x="50" y="800" width="100" height="10" fill="var(--accent-color, #10b981)" />
  
  <!-- Cover Photo -->
  <image id="cover-photo" href="var(--cover-photo-url, '')" x="0" y="0" width="794" height="500" preserveAspectRatio="xMidYMid slice" opacity="0.6" />
  
  <!-- Company Logo -->
  <image id="company-logo" href="var(--logo-url, '')" x="50" y="550" width="200" height="80" preserveAspectRatio="xMinYMin meet" />
  
  <!-- Texts -->
  <text id="proposal-title" x="50" y="700" font-family="Helvetica, Arial, sans-serif" font-size="48" font-weight="bold" fill="var(--primary-color, #3b82f6)">PROPOSTA</text>
  <text id="proposal-subtitle" x="50" y="750" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">DE SISTEMA SOLAR</text>
  
  <text id="client-name" x="50" y="850" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#e4e4e7">Para: [Nome do Cliente]</text>
  
  <text id="project-power" x="50" y="950" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="var(--accent-color, #10b981)">[Potência] kWp</text>
  <text id="city-state" x="50" y="1000" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#a1a1aa">[Cidade] - [UF]</text>
  <text id="proposal-date" x="50" y="1030" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#71717a">[Data da Proposta]</text>
</svg>
