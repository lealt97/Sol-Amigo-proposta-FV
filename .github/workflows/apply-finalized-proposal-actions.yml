name: Aplicar ações de propostas finalizadas

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-finalized-proposal-actions
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Aplicar nome e edição no Wizard
        run: python3 .github/scripts/apply-finalized-proposal-actions-v3.py

      - name: Publicar alteração
        shell: bash
        run: |
          if git diff --quiet; then
            echo "As alterações já estão aplicadas."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/propostas/ProfessionalSizingCalculatorView.tsx
          git commit -m "feat: nomear e editar propostas pelo wizard"
          git push origin HEAD:main
