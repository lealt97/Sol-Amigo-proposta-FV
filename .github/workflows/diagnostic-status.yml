name: Aplicar simplificação de HSP

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Atualizar etapa de HSP e meta de geração
        shell: bash
        run: |
          echo '' | base64 --decode > /tmp/patch_generation.py
          python /tmp/patch_generation.py
          git show b2a3d7689ac4bb153a32b2fca5e0e211d815b2c5:.github/workflows/diagnostic-status.yml > .github/workflows/diagnostic-status.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: simplificar HSP e adicionar controle de geração"
          git push origin HEAD:main
