name: Migrations — Homologação local

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-migrations:
    name: Aplicar migrations em Supabase local
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Registrar inventário de migrations
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p migration-report
          find supabase/migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' | sort | tee migration-report/repository-migrations.txt
          test -s migration-report/repository-migrations.txt
          : > migration-report/all-migrations.sql
          while IFS= read -r migration; do
            printf '\n-- ===== %s =====\n' "$migration" >> migration-report/all-migrations.sql
            cat "supabase/migrations/$migration" >> migration-report/all-migrations.sql
            printf '\n' >> migration-report/all-migrations.sql
          done < migration-report/repository-migrations.txt

      - name: Registrar ambiente Docker
        shell: bash
        run: |
          set -euo pipefail
          docker version 2>&1 | tee migration-report/docker-version.txt
          docker info 2>&1 | tee migration-report/docker-info.txt

      - name: Iniciar Supabase local
        shell: bash
        run: |
          set -o pipefail
          npx --yes supabase@2.39.2 start -x studio,imgproxy,edge-runtime,logflare,vector,supavisor --debug 2>&1 | tee migration-report/supabase-start.log

      - name: Recriar banco e aplicar todas as migrations
        shell: bash
        run: |
          set -euo pipefail
          npx --yes supabase@2.39.2 db reset --local 2>&1 | tee migration-report/db-reset.log

      - name: Confirmar migrations aplicadas
        shell: bash
        run: |
          set -euo pipefail
          npx --yes supabase@2.39.2 migration list --local 2>&1 | tee migration-report/applied-migrations.txt

      - name: Auditar schema após migrations
        shell: bash
        run: |
          set -euo pipefail
          npx --yes supabase@2.39.2 db lint --local --level warning 2>&1 | tee migration-report/db-lint.txt

      - name: Executar auditoria de RLS
        shell: bash
        run: |
          set -euo pipefail
          psql --version | tee migration-report/psql-version.txt
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 \
            -f supabase/tests/rls_audit.sql \
            2>&1 | tee migration-report/rls-audit.txt

      - name: Testar ciclo de vida dos tokens públicos
        shell: bash
        run: |
          set -euo pipefail
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 \
            -f supabase/tests/public_token_lifecycle.sql \
            2>&1 | tee migration-report/public-token-lifecycle.txt

      - name: Testar códigos de recuperação MFA
        shell: bash
        run: |
          set -euo pipefail
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 \
            -f supabase/tests/mfa_recovery_codes.sql \
            2>&1 | tee migration-report/mfa-recovery-codes.txt

      - name: Testar eventos de ativação e remoção do MFA
        shell: bash
        run: |
          set -euo pipefail
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 \
            -f supabase/tests/mfa_security_events.sql \
            2>&1 | tee migration-report/mfa-security-events.txt

      - name: Testar confirmação de senha em operações críticas
        shell: bash
        run: |
          set -euo pipefail
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 \
            -f supabase/tests/critical_password_confirmation.sql \
            2>&1 | tee migration-report/critical-password-confirmation.txt

      - name: Testar backup e restauração do banco
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/test-database-backup-restore.sh migration-report \
            2>&1 | tee migration-report/database-backup-restore.log

      - name: Registrar status do ambiente
        if: always()
        shell: bash
        run: |
          npx --yes supabase@2.39.2 status 2>&1 | tee migration-report/supabase-status.txt || true
          docker ps -a 2>&1 | tee migration-report/docker-containers.txt || true

      - name: Publicar evidências
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migrations-homologation-report
          path: migration-report
          if-no-files-found: error
          retention-days: 14

      - name: Encerrar Supabase local
        if: always()
        shell: bash
        run: npx --yes supabase@2.39.2 stop --no-backup || true
