name: Qualidade

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Gerar lockfile e validar projeto
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar código da branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Atualizar lockfile do Playwright
        run: npm install --package-lock-only --ignore-scripts

      - name: Salvar lockfile na branch
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet -- package-lock.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Update package lock for Playwright"
          git push origin HEAD:${{ github.head_ref }}

      - name: Instalar dependências
        run: npm ci

      - name: Executar validações completas
        run: npm run check
