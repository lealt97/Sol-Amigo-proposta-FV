name: Validar área de telhado opcional

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-optional-roof-area.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar TypeScript, testes e build
        run: npm run build
