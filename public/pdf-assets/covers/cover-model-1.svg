<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 794 1123" width="794" height="1123">
  <!-- Background -->
  <rect id="background-shape" width="794" height="1123" fill="var(--background-color, #09090b)" />
  
  <!-- Primary Shape -->
  <path id="primary-shape" d="M0,0 L794,0 L794,300 L0,500 Z" fill="var(--primary-color, #3b82f6)" />
  
  <!-- Secondary Shape -->
  <path id="secondary-shape" d="M0,1123 L794,1123 L794,900 L0,1000 Z" fill="var(--secondary-color, #1e3a8a)" />
  
  <!-- Accent Shape -->
  <circle id="accent-shape" cx="650" cy="200" r="100" fill="var(--accent-color, #10b981)" opacity="0.8" />
  
  <!-- Sun Decoration -->
  <circle id="sun-decoration" cx="650" cy="200" r="60" fill="#ffffff" opacity="0.3" />
  
  <!-- Cover Photo -->
  <image id="cover-photo" href="var(--cover-photo-url, '')" x="100" y="550" width="594" height="300" preserveAspectRatio="xMidYMid slice" opacity="0.8" />
  
  <!-- Company Logo -->
  <image id="company-logo" href="var(--logo-url, '')" x="50" y="50" width="200" height="80" preserveAspectRatio="xMinYMin meet" />
  
  <!-- Texts -->
  <text id="proposal-title" x="50" y="250" font-family="Helvetica, Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">PROPOSTA COMERCIAL</text>
  <text id="proposal-subtitle" x="50" y="300" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#ffffff">Sistema Solar Fotovoltaico</text>
  
  <text id="client-name" x="50" y="420" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="var(--primary-color, #3b82f6)">[Nome do Cliente]</text>
  
  <text id="project-power" x="50" y="950" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">[Potência] kWp</text>
  <text id="city-state" x="50" y="1000" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#a1a1aa">[Cidade] - [UF]</text>
  <text id="proposal-date" x="50" y="1030" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#71717a">[Data da Proposta]</text>
</svg>
