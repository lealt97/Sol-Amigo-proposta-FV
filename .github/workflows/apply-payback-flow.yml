name: Aplicar aba de payback

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-payback-flow
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Integrar payback ao fluxo
        run: python3 .github/scripts/apply-payback-flow.py

      - name: Publicar alteração
        shell: bash
        run: |
          if git diff --quiet; then
            echo "A aba de payback já está integrada."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/propostas/ProfessionalSizingCalculatorView.tsx
          git commit -m "feat: adicionar payback como penúltima etapa"
          git push origin HEAD:main
