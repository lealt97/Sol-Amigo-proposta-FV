name: Aplicar energia diária no resumo

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnostic-status.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Atualizar resumo do dimensionamento
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          calculator_path = Path('src/pages/propostas/ProfessionalSizingCalculatorView.tsx')
          source = calculator_path.read_text(encoding='utf-8')
          old = '''            <PreviewRow label="HSP" value={Number.isFinite(parseNumber(hspDaily)) ? `${number.format(parseNumber(hspDaily))} h/dia` : 'Não informada'} />
            <PreviewRow label="Potência necessária" value={result ? `${number.format(result.requiredPowerKwp)} kWp` : 'Aguardando HSP'} highlight />'''
          new = '''            <PreviewRow label="HSP" value={Number.isFinite(parseNumber(hspDaily)) ? `${number.format(parseNumber(hspDaily))} h/dia` : 'Não informada'} />
            <PreviewRow
              label="Energia de geração"
              value={result
                ? `${result.targetDailyGenerationKwh.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} kWh/dia`
                : 'Aguardando HSP'}
            />
            <PreviewRow label="Potência necessária" value={result ? `${number.format(result.requiredPowerKwp)} kWp` : 'Aguardando HSP'} highlight />'''
          if old not in source:
              raise SystemExit('Trecho esperado não encontrado no resumo.')
          calculator_path.write_text(source.replace(old, new, 1), encoding='utf-8')

          test_path = Path('tests/generation-input-only.test.ts')
          tests = test_path.read_text(encoding='utf-8')
          marker = "  assert.doesNotMatch(calculator, /setGenerationIncreasePercent\\(String\\(percentage\\)\\)/);\n"
          assertions = '''  assert.match(calculator, /label="Energia de geração"/);
  assert.match(calculator, /result\.targetDailyGenerationKwh\.toLocaleString/);
  assert.match(
    calculator,
    /label="HSP"[\\s\\S]*label="Energia de geração"[\\s\\S]*label="Potência necessária"/,
  );
'''
          if 'result\\.targetDailyGenerationKwh' not in tests:
              if marker not in tests:
                  raise SystemExit('Marcador do teste não encontrado.')
              test_path.write_text(tests.replace(marker, marker + assertions, 1), encoding='utf-8')

          one_time = Path('.github/workflows/one-time-add-daily-generation-summary.yml')
          if one_time.exists():
              one_time.unlink()
          PY

      - name: Validar
        run: |
          npm ci
          npm run typecheck
          npm run test

      - name: Publicar na main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: exibir energia diária no resumo do dimensionamento"
          git push origin HEAD:main
