name: Diagnóstico de build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: diagnostic-status-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    name: Diagnosticar TypeScript, testes e build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm ci 2>&1 | tee install.log

      - name: Publicar diagnóstico da instalação
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.install.outcome }}
        shell: bash
        run: |
          python3 .github/scripts/publish-diagnostic-status.py \
            --repository "$GITHUB_REPOSITORY" \
            --sha "$GITHUB_SHA" \
            --context "Diagnóstico / npm ci" \
            --outcome "$OUTCOME" \
            --log install.log

      - name: Verificar TypeScript
        id: typecheck
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Publicar diagnóstico do TypeScript
        if: always() && steps.install.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.typecheck.outcome }}
        shell: bash
        run: |
          python3 .github/scripts/publish-diagnostic-status.py \
            --repository "$GITHUB_REPOSITORY" \
            --sha "$GITHUB_SHA" \
            --context "Diagnóstico / TypeScript" \
            --outcome "$OUTCOME" \
            --log typecheck.log

      - name: Executar testes
        id: tests
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test 2>&1 | tee tests.log

      - name: Publicar diagnóstico dos testes
        if: always() && steps.install.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.tests.outcome }}
        shell: bash
        run: |
          python3 .github/scripts/publish-diagnostic-status.py \
            --repository "$GITHUB_REPOSITORY" \
            --sha "$GITHUB_SHA" \
            --context "Diagnóstico / Testes" \
            --outcome "$OUTCOME" \
            --log tests.log

      - name: Gerar build de produção
        id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build:app 2>&1 | tee build.log

      - name: Publicar diagnóstico do build
        if: always() && steps.install.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.build.outcome }}
        shell: bash
        run: |
          python3 .github/scripts/publish-diagnostic-status.py \
            --repository "$GITHUB_REPOSITORY" \
            --sha "$GITHUB_SHA" \
            --context "Diagnóstico / Build" \
            --outcome "$OUTCOME" \
            --log build.log

      - name: Falhar quando alguma etapa falhar
        if: always()
        shell: bash
        run: |
          test "${{ steps.install.outcome }}" = "success"
          test "${{ steps.typecheck.outcome }}" = "success"
          test "${{ steps.tests.outcome }}" = "success"
          test "${{ steps.build.outcome }}" = "success"
