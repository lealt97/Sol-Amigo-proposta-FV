name: Qualidade

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Gerar lockfile e validar projeto
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Atualizar lockfile do Playwright
        run: npm install --package-lock-only --ignore-scripts

      - name: Publicar lockfile atualizado
        uses: actions/upload-artifact@v4
        with:
          name: playwright-package-lock
          path: package-lock.json
          retention-days: 1

      - name: Instalar dependências
        run: npm ci

      - name: Executar validações completas
        run: npm run check
