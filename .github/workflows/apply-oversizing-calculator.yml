# Execução única para aplicar a funcionalidade na main.
name: Aplicar oversizing na calculadora

on:
  push:
    branches: [main]
    paths:
      - '.github/scripts/apply-oversizing-calculator.py'
      - '.github/workflows/apply-oversizing-calculator.yml'

permissions:
  contents: write

jobs:
  apply-feature:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Aplicar implementação
        run: python .github/scripts/apply-oversizing-calculator.py

      - name: Instalar dependências
        run: npm ci

      - name: Validar implementação
        run: npm run build

      - name: Commitar funcionalidade
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/calculations/oversizing.ts \
            src/pages/propostas/ProfessionalSizingCalculatorView.tsx \
            tests/oversizing.test.ts \
            tests/oversizing-calculator-integration.test.ts
          if git diff --cached --quiet; then
            echo "Nenhuma alteração necessária."
            exit 0
          fi
          git commit -m "feat: adicionar análise de oversizing à calculadora"
          git push origin main
