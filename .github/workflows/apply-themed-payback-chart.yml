name: Limpar automação temporária do gráfico

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cleanup-themed-payback-chart
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remover arquivos temporários
        shell: bash
        run: |
          rm -f .github/scripts/apply-themed-payback-chart.py
          rm -f .github/workflows/apply-themed-payback-chart.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "Arquivos temporários já removidos."
            exit 0
          fi

          git commit -m "chore: remover automação temporária do gráfico"
          git push origin HEAD:main
