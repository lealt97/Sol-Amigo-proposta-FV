name: Qualidade

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: TypeScript completo, testes e build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Executar validações completas
        id: validation
        continue-on-error: true
        run: npm run check > auth-test-audit.log 2>&1

      - name: Salvar relatório da auditoria
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-test-audit-fixed
          path: auth-test-audit.log
          retention-days: 1

      - name: Falhar quando a validação falhar
        if: steps.validation.outcome == 'failure'
        run: exit 1
