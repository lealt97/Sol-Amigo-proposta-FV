<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 794 1123" width="794" height="1123">
  <!-- Background -->
  <rect id="background-shape" width="794" height="1123" fill="var(--background-color, #09090b)" />
  
  <!-- Primary Shape -->
  <path id="primary-shape" d="M0,500 Q397,400 794,500 L794,1123 L0,1123 Z" fill="var(--primary-color, #3b82f6)" opacity="0.1" />
  
  <!-- Secondary Shape -->
  <path id="secondary-shape" d="M0,1000 Q397,900 794,1000 L794,1123 L0,1123 Z" fill="var(--secondary-color, #1e3a8a)" opacity="0.5" />
  
  <!-- Accent Shape -->
  <path id="accent-shape" d="M0,1100 L794,1100 L794,1123 L0,1123 Z" fill="var(--accent-color, #10b981)" />
  
  <!-- Cover Photo -->
  <image id="cover-photo" href="var(--cover-photo-url, '')" x="0" y="0" width="794" height="600" preserveAspectRatio="xMidYMid slice" opacity="0.7" />
  
  <!-- Company Logo -->
  <image id="company-logo" href="var(--logo-url, '')" x="297" y="50" width="200" height="100" preserveAspectRatio="xMidYMid meet" />
  
  <!-- Texts -->
  <text id="proposal-title" x="397" y="650" font-family="Helvetica, Arial, sans-serif" font-size="54" font-weight="bold" fill="#ffffff" text-anchor="middle">PROPOSTA COMERCIAL</text>
  <text id="proposal-subtitle" x="397" y="700" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="var(--accent-color, #10b981)" text-anchor="middle">ENERGIA SOLAR FOTOVOLTAICA</text>
  
  <text id="client-name" x="397" y="800" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#e4e4e7" text-anchor="middle">[Nome do Cliente]</text>
  
  <text id="project-power" x="397" y="900" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="bold" fill="var(--primary-color, #3b82f6)" text-anchor="middle">Sistema: [Potência] kWp</text>
  <text id="city-state" x="397" y="950" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#a1a1aa" text-anchor="middle">[Cidade] - [UF]</text>
  <text id="proposal-date" x="397" y="980" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#71717a" text-anchor="middle">[Data da Proposta]</text>
</svg>
