name: Aplicar contraste na seleção do kit

on:
  push:
    branches: [main]
    paths:
      - '.github/scripts/apply-kit-selection-contrast.py'

permissions:
  contents: write

jobs:
  apply-change:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Aplicar correção de contraste
        run: python .github/scripts/apply-kit-selection-contrast.py

      - name: Instalar dependências
        run: npm ci

      - name: Validar TypeScript, testes e build
        run: npm run build

      - name: Commitar funcionalidade
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/propostas/ProfessionalSizingCalculatorView.tsx tests/kit-selection-contrast.test.ts
          if git diff --cached --quiet; then
            echo "Nenhuma alteração necessária."
            exit 0
          fi
          git commit -m "fix: melhorar contraste na seleção do kit"
          git push origin main
